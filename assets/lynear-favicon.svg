<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Lynear Solutions">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <filter id="fav-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background pill — works on light and dark surfaces -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#0D0D14"/>

  <!--
    "Ly" mark — L in white, Y in gradient
    At 32x32 we use geometric paths for crispness at small sizes.
    Coordinate origin: top-left of the icon canvas.

    L: vertical bar x=5..8, horizontal bar x=5..15 at bottom
    Y: two arms diverging from a junction, then a stem down
       Left arm:  (16,7) -> (20,16)
       Right arm: (24,7) -> (20,16)
       Stem:      (20,16) -> (20,26)
  -->

  <!-- L — white, geometric strokes -->
  <rect x="5" y="7" width="3" height="18" rx="1" fill="#FFFFFF"/>
  <rect x="5" y="22" width="11" height="3" rx="1" fill="#FFFFFF"/>

  <!-- Y arms — gradient -->
  <!-- Left arm of Y -->
  <line x1="17" y1="7" x2="21" y2="16" stroke="url(#fav-grad)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Right arm of Y -->
  <line x1="26" y1="7" x2="21" y2="16" stroke="url(#fav-grad)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Stem of Y -->
  <line x1="21" y1="16" x2="21" y2="26" stroke="url(#fav-grad)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Decision node dot at Y junction -->
  <circle cx="21" cy="16" r="2.6" fill="url(#fav-grad)" filter="url(#fav-glow)"/>
  <circle cx="21" cy="16" r="1.1" fill="#FFFFFF" opacity="0.95"/>
</svg>
