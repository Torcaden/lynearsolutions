<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 82" width="320" height="82" role="img" aria-label="Lynear Solutions">
  <defs>
    <linearGradient id="v3-dot-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <!-- Soft glow filter for the node dot -->
    <filter id="v3-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LYNEAR — all white, uniform weight -->
  <!-- L -->
  <text
    x="12"
    y="46"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="42"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#FFFFFF">L</text>

  <!-- Y — white body, same weight as rest, node accent applied separately -->
  <text
    x="36"
    y="46"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="42"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#FFFFFF">Y</text>

  <!-- NEAR -->
  <text
    x="63"
    y="46"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="42"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#FFFFFF">NEAR</text>

  <!--
    Node dot accent — positioned at the junction of the Y's arms.
    For a 42px Inter Y, the crotch lands at roughly:
      x: left edge of Y char (36) + ~12px optical center  => ~50
      y: baseline (46) - ~26px (about 62% of cap height)  => ~22
    Two tiny arm-lines extend up-left and up-right to mimic the Y fork,
    then the dot sits at the junction.
  -->
  <!-- Left arm of Y accent -->
  <line x1="43" y1="15" x2="50" y2="23" stroke="#6C63FF" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Right arm of Y accent -->
  <line x1="57" y1="15" x2="50" y2="23" stroke="#00D9FF" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Stem of Y accent -->
  <line x1="50" y1="23" x2="50" y2="34" stroke="#00D9FF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Decision node — cyan dot at the Y junction, with glow -->
  <circle cx="50" cy="23" r="3.2" fill="url(#v3-dot-glow)" filter="url(#v3-glow)"/>
  <!-- Inner highlight -->
  <circle cx="50" cy="23" r="1.4" fill="#FFFFFF" opacity="0.9"/>

  <!-- Solutions -->
  <text
    x="14"
    y="65"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="3.5"
    fill="#A0A0C0">SOLUTIONS</text>
</svg>
