<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 84" width="340" height="84" role="img" aria-label="Lynear Solutions">
  <defs>
    <linearGradient id="v2-y-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
  </defs>

  <!-- LYNEAR wordmark — Y is larger/bolder, sitting on same baseline -->

  <!-- L -->
  <text
    x="12"
    y="48"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#FFFFFF">L</text>

  <!-- Y — larger (48px vs 40px), bold, gradient, nudged up slightly to optically center -->
  <text
    x="35"
    y="48"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="50"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#v2-y-grad)"
    dy="-3">Y</text>

  <!-- NEAR — back to normal size, kerned to follow the wide Y -->
  <text
    x="70"
    y="48"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#FFFFFF">NEAR</text>

  <!-- Subtle underline accent beneath Y arms — two thin diverging lines -->
  <line x1="38" y1="52" x2="45" y2="58" stroke="#6C63FF" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="62" y1="52" x2="67" y2="58" stroke="#00D9FF" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Solutions -->
  <text
    x="14"
    y="70"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12"
    font-weight="300"
    letter-spacing="4"
    fill="#A0A0C0">SOLUTIONS</text>
</svg>
