<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 82" width="320" height="82" role="img" aria-label="Lynear Solutions">
  <defs>

    <!-- Purple-to-cyan gradient for the Y -->
    <linearGradient id="v4-y-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>

    <!-- Accent underline gradient — fades in/out at edges -->
    <linearGradient id="v4-line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6C63FF" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#6C63FF" stop-opacity="0.85"/>
      <stop offset="82%"  stop-color="#00D9FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>

    <!--
      Soft wide aura behind the Y.
      Renders a blurred copy at low opacity — creates a diffuse purple-cyan halo.
    -->
    <filter id="v4-y-aura" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1.4 0   0   0  -0.1
                0   0.8 0   0   0.1
                0   0   1.5 0   0
                0   0   0   0.6 0"
        result="tinted"/>
    </filter>

    <!--
      Crisp glow filter on the Y letterform:
      - Outer wide purple glow
      - Inner tight cyan glow
      - Original letterform on top
    -->
    <filter id="v4-y-glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blurWide"/>
      <feFlood flood-color="#6C63FF" flood-opacity="0.7" result="purpleFlood"/>
      <feComposite in="purpleFlood" in2="blurWide" operator="in" result="glowPurple"/>

      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blurTight"/>
      <feFlood flood-color="#3BE0FF" flood-opacity="0.6" result="cyanFlood"/>
      <feComposite in="cyanFlood" in2="blurTight" operator="in" result="glowCyan"/>

      <feMerge>
        <feMergeNode in="glowPurple"/>
        <feMergeNode in="glowCyan"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for the accent line -->
    <filter id="v4-line-glow" x="-5%" y="-500%" width="110%" height="1100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ===================== WORDMARK ===================== -->

  <!-- Full "LYNEAR" in white — font kerning drives all spacing naturally -->
  <text
    x="12"
    y="52"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="46"
    font-weight="500"
    letter-spacing="0"
    fill="#FFFFFF">LYNEAR</text>

  <!--
    Y overlay at x=39 (= 12 + L-advance of ~27px in system-ui/Liberation Sans at 46px/500wt).
    Uses same font/size/weight as the base word so glyph shape matches exactly.
    Three layers: aura → gradient fill + glow
  -->

  <!-- Layer 1: diffuse aura halo (rendered behind the glow) -->
  <text
    x="39"
    y="52"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="46"
    font-weight="500"
    fill="#8C7FFF"
    filter="url(#v4-y-aura)">Y</text>

  <!-- Layer 2: gradient Y with crisp glow -->
  <text
    x="39"
    y="52"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="46"
    font-weight="500"
    fill="url(#v4-y-grad)"
    filter="url(#v4-y-glow)">Y</text>

  <!-- ===================== SOLUTIONS ===================== -->
  <text
    x="13"
    y="70"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12"
    font-weight="300"
    letter-spacing="4.5"
    fill="#A0A0C0">SOLUTIONS</text>

  <!-- ===================== ACCENT LINE ===================== -->
  <!-- Thin gradient rule under the wordmark, glowing at center -->
  <rect
    x="12"
    y="76.5"
    width="294"
    height="1.2"
    rx="0.6"
    fill="url(#v4-line-grad)"
    filter="url(#v4-line-glow)"
    opacity="0.92"/>

</svg>
